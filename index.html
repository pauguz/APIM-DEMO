<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UNMSM · Azure APIM Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #e2e0d8;
    --border2: #cccac0;
    --text: #1a1916;
    --text2: #6b6960;
    --text3: #9e9c95;
    --accent: #1d9e75;
    --accent-bg: #e1f5ee;
    --accent-text: #085041;
    --danger: #d85a30;
    --danger-bg: #faece7;
    --danger-text: #712b13;
    --blue: #185fa5;
    --blue-bg: #e6f1fb;
    --blue-text: #0c447c;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  header {
    width: 100%;
    max-width: 560px;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    width: 36px;
    height: 36px;
    background: var(--text);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo svg { width: 20px; height: 20px; fill: var(--bg); }

  .header-text h1 {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  .header-text p {
    font-size: 12px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }

  .tabs {
    display: flex;
    gap: 6px;
    width: 100%;
    max-width: 560px;
    margin-bottom: 1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
  }

  .tab {
    flex: 1;
    padding: 9px;
    border: none;
    border-radius: var(--radius-sm);
    background: transparent;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--text2);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .tab.active {
    background: var(--surface);
    color: var(--text);
    font-weight: 500;
    border: 1px solid var(--border);
  }

  .tab svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.8; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    width: 100%;
    max-width: 560px;
  }

  .field { margin-bottom: 1rem; }

  .field label {
    display: block;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 6px;
    font-weight: 500;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  .field input {
    width: 100%;
    padding: 10px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface2);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus { border-color: var(--border2); background: var(--surface); }

  .btn {
    width: 100%;
    padding: 11px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--text);
    color: var(--bg);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; }

  .result { margin-top: 1.25rem; }

  .result-inner {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 1.25rem;
  }

  .result-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
    font-family: 'DM Mono', monospace;
  }

  .temp-display {
    font-size: 48px;
    font-weight: 300;
    letter-spacing: -0.03em;
    color: var(--text);
    line-height: 1;
  }

  .temp-display span { font-size: 22px; color: var(--text2); }

  .weather-cond {
    font-size: 14px;
    color: var(--text2);
    margin-top: 6px;
  }

  .country-name {
    font-size: 26px;
    font-weight: 500;
    letter-spacing: -0.02em;
  }

  .meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 14px;
  }

  .meta-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
  }

  .meta-cell .lbl {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-family: 'DM Mono', monospace;
  }

  .meta-cell .val {
    font-size: 14px;
    font-weight: 500;
    margin-top: 3px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    padding: 4px 9px;
    border-radius: 99px;
    margin-top: 14px;
  }

  .badge svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2.5; }
  .badge-ok { background: var(--accent-bg); color: var(--accent-text); }
  .badge-err { background: var(--danger-bg); color: var(--danger-text); }
  .badge-info { background: var(--blue-bg); color: var(--blue-text); }

  .loading {
    font-size: 13px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .hidden { display: none; }

  .divider {
    width: 100%;
    max-width: 560px;
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.5rem 0 0;
  }

  footer {
    margin-top: 1rem;
    font-size: 11px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
  </div>
  <div class="header-text">
    <h1>Azure APIM · Demo</h1>
    <p>tarea-apim-unmsm · UNMSM 2026</p>
  </div>
</header>

<div class="tabs">
  <button class="tab active" id="tab-clima-btn" onclick="switchTab('clima')">
    <svg viewBox="0 0 24 24"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
    Clima
  </button>
  <button class="tab" id="tab-pais-btn" onclick="switchTab('pais')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    País
  </button>
</div>

<div class="card" id="panel-clima">
  <div class="field">
    <label>Ciudad</label>
    <input type="text" id="ciudad" placeholder="Lima, Madrid, Tokyo..." value="Lima"/>
  </div>
  <button class="btn" id="btn-clima" onclick="consultarClima()">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    Consultar clima
  </button>
  <div id="result-clima" class="result hidden"></div>
</div>

<div class="card hidden" id="panel-pais">
  <div class="field">
    <label>País (en inglés)</label>
    <input type="text" id="pais" placeholder="Peru, France, Japan..." value="Peru"/>
  </div>
  <button class="btn" id="btn-pais" onclick="consultarPais()">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    Consultar país
  </button>
  <div id="result-pais" class="result hidden"></div>
</div>

<hr class="divider"/>
<footer>gateway · rate-limit · api-key · cors · custom-header</footer>

<script>
const APIM_BASE = 'https://tarea-apim-unmsm.azure-api.net';
const API_KEY = 'mi-clave-secreta-123';
const SUB_KEY = 'afa3b0b1ca4245249e86389c24cfa15e';

function switchTab(tab) {
  document.getElementById('tab-clima-btn').classList.toggle('active', tab === 'clima');
  document.getElementById('tab-pais-btn').classList.toggle('active', tab === 'pais');
  document.getElementById('panel-clima').classList.toggle('hidden', tab !== 'clima');
  document.getElementById('panel-pais').classList.toggle('hidden', tab !== 'pais');
}

function getHeaders() {
  return { 'x-api-key': API_KEY, 'Ocp-Apim-Subscription-Key': SUB_KEY };
}

function checkSvg() { return `<svg viewBox="0 0 24 24" style="width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.5"><polyline points="20 6 9 17 4 12"/></svg>`; }
function crossSvg() { return `<svg viewBox="0 0 24 24" style="width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`; }

async function consultarClima() {
  const ciudad = document.getElementById('ciudad').value.trim();
  const resultDiv = document.getElementById('result-clima');
  const btn = document.getElementById('btn-clima');
  if (!ciudad) return;
  btn.disabled = true;
  resultDiv.classList.remove('hidden');
  resultDiv.innerHTML = '<div class="result-inner"><p class="loading">consultando gateway...</p></div>';
  try {
    const res = await fetch(`${APIM_BASE}/clima/${encodeURIComponent(ciudad)}?format=j1`, { headers: getHeaders() });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const raw = await res.text();
    const data = JSON.parse(raw);    
    const current = data.current_condition[0];
    const temp = current.temp_C;
    const cond = current.weatherDesc[0].value;
    const humidity = current.humidity;
    const wind = current.windspeedKmph;
    resultDiv.innerHTML = `
      <div class="result-inner">
        <p class="result-label">clima · ${ciudad.toLowerCase()}</p>
        <p class="temp-display">${temp}<span>°C</span></p>
        <p class="weather-cond">${cond}</p>
        <div class="meta-grid" style="margin-top:12px">
          <div class="meta-cell"><p class="lbl">Humedad</p><p class="val">${humidity}%</p></div>
          <div class="meta-cell"><p class="lbl">Viento</p><p class="val">${wind} km/h</p></div>
        </div>
        <span class="badge badge-ok">${checkSvg()} 200 OK · APIM</span>
        <span class="badge badge-info" style="margin-left:4px">rate-limit · api-key</span>
      </div>`;
  } catch(e) {
    resultDiv.innerHTML = `<div class="result-inner"><span class="badge badge-err">${crossSvg()} ${e.message}</span><p style="font-size:12px;color:#9e9c95;margin-top:8px;font-family:'DM Mono',monospace">Verifica la configuración del gateway.</p></div>`;
  }
  btn.disabled = false;
}

async function consultarPais() {
  const pais = document.getElementById('pais').value.trim();
  const resultDiv = document.getElementById('result-pais');
  const btn = document.getElementById('btn-pais');
  if (!pais) return;
  btn.disabled = true;
  resultDiv.classList.remove('hidden');
  resultDiv.innerHTML = '<div class="result-inner"><p class="loading">consultando gateway...</p></div>';
  try {
    const res = await fetch(`${APIM_BASE}/paises/name/${encodeURIComponent(pais)}`, { headers: getHeaders() });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const c = Array.isArray(data) ? data[0] : data;
    const nombre = c.name?.common || pais;
    const capital = c.capital?.[0] || '—';
    const poblacion = c.population ? (c.population / 1e6).toFixed(1) + 'M' : '—';
    const region = c.region || '—';
    const moneda = c.currencies ? Object.values(c.currencies)[0]?.name || '—' : '—';
    const flag = c.flag || '';
    resultDiv.innerHTML = `
      <div class="result-inner">
        <p class="result-label">país · ${nombre.toLowerCase()}</p>
        <p class="country-name">${flag} ${nombre}</p>
        <div class="meta-grid">
          <div class="meta-cell"><p class="lbl">Capital</p><p class="val">${capital}</p></div>
          <div class="meta-cell"><p class="lbl">Población</p><p class="val">${poblacion}</p></div>
          <div class="meta-cell"><p class="lbl">Región</p><p class="val">${region}</p></div>
          <div class="meta-cell"><p class="lbl">Moneda</p><p class="val">${moneda}</p></div>
        </div>
        <span class="badge badge-ok">${checkSvg()} 200 OK · APIM</span>
        <span class="badge badge-info" style="margin-left:4px">rate-limit · api-key</span>
      </div>`;
  } catch(e) {
    resultDiv.innerHTML = `<div class="result-inner"><span class="badge badge-err">${crossSvg()} ${e.message}</span><p style="font-size:12px;color:#9e9c95;margin-top:8px;font-family:'DM Mono',monospace">Verifica la configuración del gateway.</p></div>`;
  }
  btn.disabled = false;
}
</script>
</body>
</html>
